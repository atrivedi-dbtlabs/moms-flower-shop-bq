models:
  - name: stg_mfs__flower_orders
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - not_null
  - name: stg_mfs__website_events
    columns:
      - name: event_id
        data_tests:
          - not_null
          - unique
      - name: event_name
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: 
                  - 'page_hit'
                  - 'add_to_cart'
                  - 'go_to_checkout'
                  - 'place_order'